<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GB Golf Optimizer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Prompt:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head_extra %}{% endblock %}
</head>
<body>

{% block before_header %}{% endblock %}

<header>
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <img src="https://gameblazers.com/gb-logo.png" alt="GameBlazers" class="gb-logo" onerror="this.style.display='none'" />
    <h1><a href="{{ url_for('main.index') }}" class="title-link">GB Golf Optimizer</a> <span class="app-version">(v{{ app_version }})</span></h1>
    <p class="hero-subtitle">Fantasy Golf &bull; Lineup Optimizer</p>
    <p class="hero-nav"><a href="{{ url_for('main.changelog') }}">Changelog</a></p>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

</body>
</html>
